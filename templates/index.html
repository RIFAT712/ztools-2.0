<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>উইকি নিবন্ধের শব্দ গণক</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>
<button id="themeToggle">🌙 / ☀️</button>

<div class="container">
  <div class="header">
    <h1 class="title">উইকি নিবন্ধের শব্দ গণক</h1>
    <div class="controls">
  <label for="fountainCode" class="input-label">
    ফাউন্টেন ইউআরএল এর শেষের কোডটি লিখুন — যেমন: https://fountain.toolforge.org/editathons/voy25 এই ক্ষেত্রে কোডটি হবে voy25
  </label>
  <input id="fountainCode" type="text" aria-label="ফাউন্টেন ইউআরএল এর শেষের কোডটি লিখুন">
  
  <div class="buttons">
    <button id="countBtn" class="btn">📝 শব্দসংখ্যা গণনা করুন</button>
    <button id="juryBtn" class="btn warn">🧐 পর্যালোচনা পরিসংখ্যান গণনা করুন</button>
  </div>
</div>

  </div>

  <div id="error" class="error hidden"></div>
  <div class="progress-wrap" id="progressWrap"><div class="progress" id="progressBar"></div></div>

  <div class="card hidden" id="resultCard" aria-live="polite">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="small" id="resultTitle">ফলাফল</div>
      <div>
        <button class="copy-btn" id="copyWikiBtn">📋 সকল ব্যবহারকারী</button>
      </div>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
    <div id="summary" class="small" style="margin-top:10px;text-align:right;color:var(--muted)"></div>
  </div>

  <div class="card hidden" id="juryCard">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="small">পর্যালোচনা পরিসংখ্যান</div>
      <button class="copy-btn" id="copyJuryBtn">📋 উইকিটেবিল কপি করুন</button>
    </div>
    <div class="table-wrap" id="juryParsedWrap"></div>
  </div>
</div>


<script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
