<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>উইকি নিবন্ধের শব্দ গণক</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <h1 class="title">উইকি নিবন্ধের শব্দ গণক</h1>
        <div class="auth-box">
          <button id="themeToggle" title="থিম পরিবর্তন করুন"></button>
          {% if username %}
          <span class="user-info"><strong>{{ username }}</strong></span>
          <a href="{{ url_for('comment') }}" class="btn-link">পর্যালোচনা</a>
          <a href="{{ url_for('auth.logout') }}" class="btn-link"
            style="color: #ff4d4d; border-color: #ff4d4d;">লগ-আউট</a>
          {% else %}
          <a href="{{ url_for('auth.login') }}" class="btn-link">লগ-ইন</a>
          {% endif %}
        </div>
      </div>

      <div class="controls">
        <label class="input-label">একটি এডিটাথন নির্বাচন করুন:</label>
        <div class="custom-dropdown" id="editathon-dropdown">
            <button class="dropdown-trigger" id="dropdown-trigger" disabled>এডিটাথন লোড হচ্ছে...</button>
            <div class="dropdown-list hidden" id="dropdown-list">
                <!-- Options will be injected here -->
            </div>
            <input type="hidden" id="selected-editathon-code" value="">
        </div>

        <div class="buttons">
          <button id="countBtn" class="btn">শব্দসংখ্যা পরিসংখ্যান</button>
          <button id="juryBtn" class="btn">পর্যালোচনা পরিসংখ্যান</button>
          <button id="rejectedBtn" class="btn">বাতিলকৃত নিবন্ধ</button>
        </div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress" id="progressBar"></div>
    </div>

    <div class="card hidden" id="resultCard" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="small" id="resultTitle">ফলাফল</div>
        <div class="custom-dropdown download-dropdown" id="download-dropdown-container">
            <button class="copy-btn dropdown-trigger download-trigger">ডাউনলোড</button>
            <div class="dropdown-list hidden">
                <div class="dropdown-item" data-type="csv">CSV ডাউনলোড</div>
                <div class="dropdown-item" data-type="wikitable">উইকিটেবিল কপি</div>
                <div class="dropdown-item" data-type="json">JSON ডাউনলোড</div>
            </div>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap"></div>
      <div id="summary" class="small" style="margin-top:10px;text-align:right;color:var(--muted)"></div>
    </div>

    <div class="card hidden" id="juryCard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="small">পর্যালোচনা পরিসংখ্যান</div>
        <div class="custom-dropdown download-dropdown" id="jury-download-dropdown">
            <button class="copy-btn dropdown-trigger download-trigger">ডাউনলোড</button>
            <div class="dropdown-list hidden">
                <div class="dropdown-item" data-type="csv">CSV ডাউনলোড</div>
                <div class="dropdown-item" data-type="wikitable">উইকিটেবিল কপি</div>
                <div class="dropdown-item" data-type="json">JSON ডাউনলোড</div>
            </div>
        </div>
      </div>
      <div class="table-wrap" id="juryParsedWrap"></div>
    </div>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
